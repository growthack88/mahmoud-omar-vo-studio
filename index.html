<html lang="ar" dir="rtl">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&family=Rubik:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    
    <style>
      :root {
        --mo-black: #1A1A1A;
        --mo-yellow: #F5C518;
        --mo-white: #FFFFFF;
        --mo-cream: #F5F0E8;
        --mo-ink: #0A0A0A;
        --mo-hairline: #E8E4DC;
        --mo-gray-60: #666666;
        --mo-red: #D63030;
      }

      body {
        font-family: 'Rubik', sans-serif;
        background-color: var(--mo-cream);
        color: var(--mo-ink);
        overflow-x: hidden;
      }

      /* Editorial Typography */
      .editorial-display { 
        font-size: 72px; 
        font-weight: 900; 
        line-height: 1; 
        letter-spacing: -0.02em; 
      }
      
      .editorial-header-title {
        font-size: 96px;
        font-weight: 900;
        line-height: 1;
        color: var(--mo-ink);
      }

      /* Layout Elements */
      .editorial-border {
        border: 2px solid var(--mo-ink);
        border-radius: 0;
      }
      
      .block-shadow {
        box-shadow: 6px 6px 0 var(--mo-ink);
      }
      
      .block-shadow-hover:hover {
        transform: translate(-2px, -2px);
        box-shadow: 4px 4px 0 var(--mo-ink);
      }

      .hairline {
        border: 0;
        border-top: 1px solid var(--mo-ink);
      }
      
      .hairline-muted {
        border: 0;
        border-top: 1px solid var(--mo-hairline);
      }

      /* Selected State */
      .selected-state {
        background-color: var(--mo-yellow) !important;
        color: var(--mo-ink) !important;
        box-shadow: 6px 6px 0 var(--mo-ink) !important;
      }

      /* Section Headers */
      .section-kicker {
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: var(--mo-gray-60);
      }
      
      .section-number {
        font-size: 14px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.3em;
        color: var(--mo-ink);
        background: var(--mo-yellow);
        padding: 4px 12px;
      }

      .section-title {
        font-size: 48px;
        font-weight: 800;
        line-height: 1.1;
        color: var(--mo-ink);
      }

      /* Intro Styles */
      .intro-container {
        background: var(--mo-cream);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      
      .intro-kicker {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.4em;
        color: var(--mo-ink);
      }

      /* Footer */
      .editorial-footer {
        background: var(--mo-ink);
        color: var(--mo-white);
        padding: 80px 60px;
        border-top: 8px solid var(--mo-yellow);
      }

      /* Custom UI Components */
      .mo-button-primary {
        background: var(--mo-ink);
        color: var(--mo-white);
        border: 2px solid var(--mo-ink);
        padding: 20px 48px;
        font-weight: 700;
        font-size: 16px;
        letter-spacing: 0.05em;
        border-radius: 0;
        transition: all 0.2s ease;
      }
      .mo-button-primary:hover:not(:disabled) {
        background: var(--mo-yellow);
        color: var(--mo-ink);
      }
      .mo-button-primary:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .mo-button-secondary {
        background: transparent;
        color: var(--mo-ink);
        border: 2px solid var(--mo-ink);
        padding: 20px 48px;
        font-weight: 700;
        font-size: 16px;
        border-radius: 0;
        transition: all 0.2s ease;
      }
      .mo-button-secondary:hover:not(:disabled) {
        background: var(--mo-ink);
        color: var(--mo-white);
      }

      .mo-input {
        background: var(--mo-white);
        border: 2px solid var(--mo-ink);
        border-radius: 0;
        padding: 20px;
        font-weight: 400;
        font-size: 16px;
        outline: none;
      }
      .mo-input:focus {
        border-color: var(--mo-yellow);
        box-shadow: 0 0 0 4px rgba(245, 197, 24, 0.2);
      }

      /* Portrait Hero */
      .portrait-hero-circle {
        width: 280px;
        height: 280px;
        border-radius: 50%;
        border: 3px solid var(--mo-ink);
        filter: grayscale(100%) contrast(1.1);
        transition: filter 0.4s ease;
        object-fit: cover;
      }
      .portrait-hero-circle:hover {
        filter: grayscale(0);
      }

      .mo-footer-social {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .mo-footer-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #FAF7F2;
        font-size: 16px;
        text-decoration: none;
        transition: all 0.22s ease;
      }

      .mo-footer-icon:hover {
        background: #FFCF40;
        color: #0A0A0A;
        border-color: #FFCF40;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(255, 207, 64, 0.35);
      }

      /* Voice Gallery & Card Styles */
      .voice-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }

      @media (max-width: 1280px) { .voice-grid { grid-template-columns: repeat(3, 1fr); } }
      @media (max-width: 900px)  { .voice-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 560px)  { .voice-grid { grid-template-columns: 1fr; } }

      .voice-card {
        background: linear-gradient(180deg, #1A1A1A 0%, #0F0F0F 100%);
        border: 1px solid rgba(255, 207, 64, 0.12);
        border-radius: 18px;
        padding: 22px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        text-align: right;
      }

      .voice-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(600px circle at var(--mx, 50%) var(--my, 0%), rgba(255, 207, 64, 0.06), transparent 40%);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .voice-card:hover {
        transform: translateY(-4px);
        border-color: rgba(255, 207, 64, 0.35);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 207, 64, 0.1);
      }

      .voice-card:hover::before { opacity: 1; }

      .voice-card--pinned {
        border-color: #FFCF40;
        box-shadow: 0 0 0 2px rgba(255, 207, 64, 0.4), 0 20px 40px rgba(255, 207, 64, 0.15);
      }

      .voice-card--pinned::after {
        content: '✓ معتمد';
        position: absolute;
        top: 12px;
        right: 12px;
        background: #FFCF40;
        color: #0A0A0A;
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .voice-card .dialect-badge {
        background: rgba(255, 207, 64, 0.12);
        color: #FFCF40;
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 207, 64, 0.25);
        display: inline-block;
      }

      .voice-card .name {
        font-family: 'Tajawal', sans-serif;
        font-weight: 800;
        font-size: 28px;
        color: #FAF7F2;
        margin-top: 14px;
      }

      .voice-card .name-en {
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        color: #FFCF40;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        margin-top: 4px;
      }

      .voice-card .description {
        font-family: 'Tajawal', sans-serif;
        font-size: 14px;
        line-height: 1.7;
        color: rgba(255, 255, 255, 0.65);
        margin: 14px 0;
      }

      .voice-card .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 16px;
      }

      .btn-preview {
        background: transparent;
        color: #FAF7F2;
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 10px 14px;
        border-radius: 10px;
        font-family: 'Tajawal', sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.22s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn-preview:hover { border-color: #FFCF40; color: #FFCF40; }

      .btn-pin {
        background: #FFCF40;
        color: #0A0A0A;
        border: none;
        padding: 10px 14px;
        border-radius: 10px;
        font-family: 'Tajawal', sans-serif;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.22s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .btn-pin:hover { background: #F5B800; transform: translateY(-1px); }
      .btn-pin[disabled] { opacity: 0.5; cursor: not-allowed; }

      .voice-card .category-tag {
        font-size: 10px;
        color: #FFCF40;
        opacity: 0.6;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 8px;
        display: block;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: var(--mo-cream); }
      ::-webkit-scrollbar-thumb { background: var(--mo-ink); }
      
      /* Toast */
      .toast-editorial {
        position: fixed;
        bottom: 2rem;
        left: 2rem;
        background: var(--mo-ink);
        color: white;
        border-left: 4px solid var(--mo-red);
        padding: 16px 24px;
        z-index: 1000;
      }

      /* Mobile */
      @media (max-width: 640px) {
        .mo-social { gap: 6px; }
        .mo-social-link { width: 34px; height: 34px; font-size: 14px; }
      }
    </style>

    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
